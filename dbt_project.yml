name: 'tech_ecosystem_tracker'
version: '1.0.0'
config-version: 2

profile: 'tech_ecosystem_tracker'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  tech_ecosystem_tracker:
    staging:
      +materialized: view
      +schema: staging
      stackoverflow:
        +tags: ['stackoverflow', 'survey']
      jetbrains:
        +tags: ['jetbrains', 'survey']
      github:
        +tags: ['github', 'activity']
    intermediate:
      +materialized: table
      +schema: staging
    marts:
      +materialized: table
      +schema: analytics
    monitoring:
      +materialized: table
      +schema: analytics
