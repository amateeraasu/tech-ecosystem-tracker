version: 2

sources:
  - name: raw
    database: TECH_ECOSYSTEM
    schema: RAW
    tables:
      - name: raw_stackoverflow_survey
        description: Stack Overflow Developer Survey responses (2021-2025)
        columns:
          - name: response_id
            tests:
              - not_null
          - name: survey_year
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: [2021, 2022, 2023, 2024, 2025]

      - name: raw_jetbrains_survey
        description: JetBrains Developer Ecosystem Survey responses (2021-2025)
        columns:
          - name: response_id
            tests:
              - not_null

      - name: raw_github_monthly_activity
        description: GitHub Archive monthly activity aggregated from BigQuery
        columns:
          - name: activity_month
            tests:
              - not_null
          - name: repo_language
            tests:
              - not_null
